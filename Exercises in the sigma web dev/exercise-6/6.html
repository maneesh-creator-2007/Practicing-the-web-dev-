<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>creating the nav bar</title>
    <link rel="stylesheet" href="6.css">
</head>
<body>
    <div class="container">

       <div class="left">
         <div class="logo">
            <img src="https://up.yimg.com/ib/th/id/OIP.v3oY1THnEjgf4UcGnmPWnQHaHa?pid=Api&rs=1&c=1&qlt=95&w=109&h=109" alt="ultra edit image" width=" 50px">
        </div>

        <div class="logoname">
            <div class="mainname">Ultra Edit</div>
            <div class="followtext">An idere inc. company</div>
        </div>
       </div>

      <div class="right">
          <div class="product">
            <select >
                <option value="product">product</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </div>

        <div class="pricing">
             <select >
                <option value="pricing">pricing</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </div>

        <div class="resource">
             <select >
                <option value="resources">resources</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </div>

        <div class="aboutus">
             <select >
                <option value="aboutus">about us</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </div>

      </div>
    </div>
</body>
</html>
