<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>media queiry</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: rgb(0, 191, 255);
            margin: 10px;
            display: inline-block;
        }
            @media only screen and (max-width: 500px){
                body{
                    background-color: rgb(126, 120, 120);
                }
                div{
                    background-color: red;
                }
            }
      
        
    </style>
</head>
<body>
    <h1>this is media query example</h1>
    
        <div>box 1</div>
        <div>box 2</div>
        <div>box 3</div>
    
</body>
</html>
